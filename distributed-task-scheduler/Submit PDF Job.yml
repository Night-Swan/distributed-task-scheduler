info:
  name: Submit PDF Job
  type: http
  seq: 6

http:
  method: POST
  url: http://localhost:8080/jobs/pdf
  body:
    type: multipart-form
    data:
      - name: file
        type: file
        value:
          - /home/nightswan/Downloads/CitationList.pdf
        contentType: application/pdf
      - name: submitted_by
        type: text
        value: nightswan
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
